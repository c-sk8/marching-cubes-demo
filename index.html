<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="stylesheet" href="marching.css" type="text/css">
<title>Marching Cubes Demo</title>
</head>
<body>

<div id="hud">
    <div>Surface: <span id="surfaceIndex"></span> <span id="surfaceName"></span></div>
    <div>Surface Variant: <span id="variantIndex"></span></div>
    <div>Colour Mode: <span id="colourModeIndex"></span> <span id="colourMode"></span></div>
    <div>Vertices: <span id="vertexCount"></span></div>
    <div>Time: <span id="surfGenTime"></span></div>
</div>

<div class="controls">

    <div class="group">
        <button id="prevSurface">◀</button>
        <button id="nextSurface">▶</button>
    </div>

    <div class="group">
        <button id="nextVariant">▲</button>
        <button id="prevVariant">▼</button>
    </div>

    <div class="group">
        <button id="prevColour">[</button>
        <button id="nextColour">]</button>
    </div>

    <div class="group">
        <button id="zoomIn">+</button>
        <button id="zoomOut">−</button>
    </div>

    <div class="group">
        <button id="flatShading">/</button>
        <button id="animateSurfaceGeneration">\</button>
    </div>

    <div class="group">
        <button class="size-btn" id="size30" data-size="30">30</button>
        <button class="size-btn" id="size60" data-size="60">60</button>
        <button class="size-btn is-active" id="size90" data-size="90">90</button>
        <button class="size-btn" id="size120" data-size="120">120</button>
        <button class="size-btn" id="size150" data-size="150">150</button>
    </div>

</div>

<script type="module" src="main.js"></script>

</body>
</html>
