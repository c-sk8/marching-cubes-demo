<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="stylesheet" href="marching.css" type="text/css">
<title>Marching Cubes Demo</title>
</head>
<body>

<div id="hud">
    <div>Surface: <span id="surfaceIndex"></span> <span id="surfaceName"></span> <span id="variantIndex"></span></div>
    <div>Colour Mode: <span id="colourMode"></span> <span id="colourModeIndex"></span></div>
    <div>Bounds: <span id="surfaceBounds"></span></div>
    <div>Vertices: <span id="vertexCount"></span></div>
    <div>Time: <span id="surfGenTime"></span></div>
</div>

<div class="controls hidden" id="hiddencontrols">
    <div class="group dimmed">
        <button id="showControls">H</button>
    </div>
</div>

<div class="controls" id="controls">

    <div class="group">
        <button id="hideControls">H</button>
    </div>

    <div class="group">
        <button id="prevSurface">◀</button>
        <button id="nextSurface">▶</button>
    </div>

    <div class="group">
        <button id="nextVariant">▲</button>
        <button id="prevVariant">▼</button>
    </div>

    <div class="group">
        <button id="prevColour">[</button>
        <button id="nextColour">]</button>
    </div>

    <div class="group">
        <button id="zoomIn">+</button>
        <button id="zoomOut">−</button>
    </div>

    <div class="group">
        <button id="flatShading" class="is-active">/</button>
        <button id="animateSurfaceGeneration" class="is-active">\</button>
    </div>

    <div class="group">
        <button class="size-btn" id="num1" data-size="50">1</button>
        <button class="size-btn is-active" id="num2" data-size="100">2</button>
        <button class="size-btn" id="num3" data-size="150">3</button>
        <button class="size-btn" id="num4" data-size="200">4</button>
    </div>

</div>

<script type="module" src="main.js"></script>

</body>
</html>
